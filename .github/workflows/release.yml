name: Create release on Version Bump

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
          contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 2

    - name: Get current version from Cargo.toml
      id: get_version
      run: |
        CRATE_VERSION="$(grep -m 1 -i "^version" Cargo.toml | cut -d '"' -f 2)" 
        echo "VERSION=$CRATE_VERSION" >> $GITHUB_ENV
        echo "version=$CRATE_VERSION" >> $GITHUB_OUTPUT

    - name: Check if version actually changed
      id: check_version
      run: |
        # Get the version from the previous commit
        PREV_VERSION=$(git show HEAD~1:Cargo.toml | grep -m 1 '^version = ' | cut -d '"' -f 2 || echo "")
        
        if [ "$VERSION" = "$PREV_VERSION" ]; then
          echo "Version has not changed ($VERSION). Skipping release."
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "Version bumped from '$PREV_VERSION' to '$VERSION'."
          echo "changed=true" >> $GITHUB_OUTPUT
        fi
