name: Create release on Version Bump

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
          contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 2

    - name: Get current version from Cargo.toml
      id: get_version
      run: |
        CRATE_VERSION="$(grep -m 1 -i "^version" Cargo.toml | cut -d '"' -f 2)" 
        echo "VERSION=$CRATE_VERSION" >> $GITHUB_ENV
        echo "version=$CRATE_VERSION" >> $GITHUB_OUTPUT
        CHANGELOG="$(sed -n "/^## \\[${CRATE_VERSION//./\\.}\\]/,/^## \\[/p" CHANGELOG.md | sed '${/^## \[/d;}')"
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Check if version actually changed
      id: check_version
      run: |
        PREV_VERSION=$(git show HEAD~1:Cargo.toml | grep -m 1 '^version = ' | cut -d '"' -f 2 || echo "")

        if [ -z "$CHANGELOG" ]; then
          echo "Changelog is empty ($VERSION). Skipping release."
          echo "changed=false" >> $GITHUB_OUTPUT
        fi
        
        if [ "$VERSION" = "$PREV_VERSION" ]; then
          echo "Version has not changed ($VERSION). Skipping release."
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "Version bumped from '$PREV_VERSION' to '$VERSION'."
          echo "changed=true" >> $GITHUB_OUTPUT
        fi

    - name: Build AppImage
      if: steps.check_version.outputs.changed == 'true'
      run: |
        chmod +x ./package-appimage.sh
        ./package-appimage.sh

    - name: Create Github Release
      if: steps.check_version.outputs.changed == 'true'
      uses: softprops/action-gh-release@v3
      with: 
        tag_name: v${{ steps.get_version.outputs.version }}
        body: ${{ steps.get_version.outputs.changelog }}
        prerelease: false
        make_latest: true
        files: |
          ./appimage-out/gifboard-x86_64.AppImage

        

